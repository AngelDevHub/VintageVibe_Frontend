<div class="login-page">
    <div class="login-container">
        <!-- Left Side - Image & Branding -->
        <div class="login-visual">
            <div class="visual-overlay">
                <div class="visual-content">
                    <svg class="brand-logo" width="80" height="80" viewBox="0 0 40 40" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2" />
                        <path d="M12 16C12 16 15 12 20 12C25 12 28 16 28 16" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <path d="M12 24C12 24 15 28 20 28C25 28 28 24 28 24" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <circle cx="15" cy="20" r="1.5" fill="currentColor" />
                        <circle cx="25" cy="20" r="1.5" fill="currentColor" />
                    </svg>
                    <h1 class="visual-title">VintageVibe</h1>
                    <p class="visual-subtitle">Descubre el encanto del pasado</p>
                    <div class="visual-features">
                        <div class="feature-item">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="20 6 9 17 4 12" />
                            </svg>
                            <span>Piezas auténticas y únicas</span>
                        </div>
                        <div class="feature-item">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="20 6 9 17 4 12" />
                            </svg>
                            <span>Envío gratuito en pedidos +$50</span>
                        </div>
                        <div class="feature-item">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="20 6 9 17 4 12" />
                            </svg>
                            <span>Devoluciones fáciles en 30 días</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-form-section">
            <div class="form-container">
                <div class="form-header">
                    <h2 class="form-title">Bienvenido de vuelta</h2>
                    <p class="form-subtitle">Inicia sesión para continuar tu experiencia vintage</p>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <button type="button" class="social-btn" (click)="loginWithGoogle()">
                        <svg width="20" height="20" viewBox="0 0 20 20">
                            <path fill="#4285F4"
                                d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z" />
                            <path fill="#34A853"
                                d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z" />
                            <path fill="#FBBC05"
                                d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z" />
                            <path fill="#EA4335"
                                d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z" />
                        </svg>
                        Continuar con Google
                    </button>

                    <button type="button" class="social-btn" (click)="loginWithFacebook()">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="#1877F2">
                            <path
                                d="M20 10c0-5.523-4.477-10-10-10S0 4.477 0 10c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V10h2.54V7.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V10h2.773l-.443 2.89h-2.33v6.988C16.343 19.128 20 14.991 20 10z" />
                        </svg>
                        Continuar con Facebook
                    </button>
                </div>

                <div class="divider">
                    <span>O continúa con email</span>
                </div>

                <!-- Login Form -->
                <form (ngSubmit)="onSubmit()" class="login-form">
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                            <input type="email" id="email" [(ngModel)]="email" name="email" class="form-input"
                                placeholder="tu@email.com" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Contraseña</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                            <input type="password" id="password" [(ngModel)]="password" name="password"
                                class="form-input" placeholder="••••••••" required />
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" class="form-checkbox" />
                            <span>Recuérdame</span>
                        </label>
                        <a href="#forgot" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full" [disabled]="isLoading()">
                        <span *ngIf="!isLoading()">Iniciar Sesión</span>
                        <span *ngIf="isLoading()" class="loading-spinner">
                            <svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                            </svg>
                            Iniciando...
                        </span>
                    </button>
                </form>

                <p class="signup-prompt">
                    ¿No tienes una cuenta?
                    <a routerLink="/register" class="signup-link">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>
</div>
