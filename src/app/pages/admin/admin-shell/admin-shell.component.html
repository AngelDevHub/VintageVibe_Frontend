<div class="admin-shell">
  <!-- Sidebar -->
  <aside class="admin-sidebar" [class.collapsed]="sidebarCollapsed()">
    <div class="sidebar-logo">
      <img src="images/logo-letras.png" alt="VintageVibe" class="sidebar-logo-img" *ngIf="!sidebarCollapsed()">
      <span class="sidebar-logo-short" *ngIf="sidebarCollapsed()">VV</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/admin" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="active" title="Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/admin/products" routerLinkActive="active" title="Productos">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>Productos</span>
      </a>
      <a class="nav-item" routerLink="/admin/orders" routerLinkActive="active" title="Pedidos">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Pedidos</span>
      </a>
      <a class="nav-item" routerLink="/admin/users" routerLinkActive="active" title="Usuarios">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Usuarios</span>
      </a>
      <a class="nav-item" routerLink="/admin/payments" routerLinkActive="active" title="Pagos">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        <span>Pagos</span>
      </a>

      <div class="nav-divider"></div>

      <a class="nav-item" routerLink="/admin/catalog" routerLinkActive="active" title="Catálogo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>Catálogo</span>
      </a>
      <a class="nav-item" routerLink="/admin/coupons" routerLinkActive="active" title="Cupones">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span>Cupones</span>
      </a>
      <a class="nav-item" routerLink="/admin/reviews" routerLinkActive="active" title="Reviews">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>Reviews</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/" class="sidebar-back" title="Volver al sitio">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        <span>Volver al sitio</span>
      </a>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="admin-main">
    <!-- Topbar -->
    <header class="admin-topbar">
      <button class="topbar-toggle" (click)="sidebarCollapsed.set(!sidebarCollapsed())">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title">Panel de Administración</span>
      <div class="topbar-right">
        <span class="topbar-admin-badge">ADMIN</span>
        <span class="topbar-user">{{ userName() }}</span>
      </div>
    </header>

    <!-- Router Outlet -->
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
