<div class="register-page">
    <div class="register-container">
        <!-- Visual Side -->
        <div class="register-visual">
            <div class="visual-overlay">
                <div class="visual-content">
                    <svg class="brand-logo" width="80" height="80" viewBox="0 0 40 40" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2" />
                        <path d="M12 16C12 16 15 12 20 12C25 12 28 16 28 16" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <path d="M12 24C12 24 15 28 20 28C25 28 28 24 28 24" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <circle cx="15" cy="20" r="1.5" fill="currentColor" />
                        <circle cx="25" cy="20" r="1.5" fill="currentColor" />
                    </svg>
                    <h1 class="visual-title">Únete a VintageVibe</h1>
                    <p class="visual-subtitle">Comienza tu viaje en la moda vintage</p>
                    <div class="visual-stats">
                        <div class="stat-item">
                            <h3 class="stat-number">10,000+</h3>
                            <p class="stat-label">Clientes felices</p>
                        </div>
                        <div class="stat-item">
                            <h3 class="stat-number">5,000+</h3>
                            <p class="stat-label">Piezas únicas</p>
                        </div>
                        <div class="stat-item">
                            <h3 class="stat-number">98%</h3>
                            <p class="stat-label">Satisfacción</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form Side -->
        <div class="register-form-section">
            <div class="form-container">
                <div class="form-header">
                    <h2 class="form-title">Crea tu cuenta</h2>
                    <p class="form-subtitle">Completa tus datos para empezar</p>
                </div>

                <form (ngSubmit)="onSubmit()" class="register-form">
                    <div class="form-group">
                        <label for="name" class="form-label">Nombre completo</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            <input type="text" id="name" [(ngModel)]="name" name="name" class="form-input"
                                placeholder="Juan Pérez" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                            <input type="email" id="email" [(ngModel)]="email" name="email" class="form-input"
                                placeholder="tu@email.com" required />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password" class="form-label">Contraseña</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                                <input type="password" id="password" [(ngModel)]="password" name="password"
                                    class="form-input" placeholder="••••••••" required minlength="6" />
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword" class="form-label">Confirmar</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                                <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword"
                                    name="confirmPassword" class="form-input" placeholder="••••••••" required />
                            </div>
                        </div>
                    </div>

                    <label class="checkbox-label terms-label">
                        <input type="checkbox" [(ngModel)]="acceptTerms" name="acceptTerms" class="form-checkbox"
                            required />
                        <span>
                            Acepto los <a href="#terms" class="link">términos y condiciones</a>
                            y la <a href="#privacy" class="link">política de privacidad</a>
                        </span>
                    </label>

                    <button type="submit" class="btn btn-primary btn-full" [disabled]="isLoading()">
                        <span *ngIf="!isLoading()">Crear Cuenta</span>
                        <span *ngIf="isLoading()" class="loading-spinner">
                            <svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                            </svg>
                            Creando cuenta...
                        </span>
                    </button>
                </form>

                <p class="login-prompt">
                    ¿Ya tienes una cuenta?
                    <a routerLink="/login" class="login-link">Inicia sesión aquí</a>
                </p>
            </div>
        </div>
    </div>
</div>
